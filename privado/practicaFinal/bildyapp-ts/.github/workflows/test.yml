name: CI — Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'privado/practicaFinal/bildyapp-ts/**'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Jest Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: privado/practicaFinal/bildyapp-ts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: privado/practicaFinal/bildyapp-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret