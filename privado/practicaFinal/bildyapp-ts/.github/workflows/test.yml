name: CI — Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'privado/practicaFinal/bildyapp-ts/**'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Jest Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: privado/practicaFinal/bildyapp-ts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: privado/practicaFinal/bildyapp-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          # Los secrets se configuran en GitHub → Settings → Secrets and variables → Actions
          # No usar valores hardcodeados aquí para evitar exponer credenciales en el repo.
          # mongodb-memory-server no necesita MONGODB_URI real; setup.ts lo genera en memoria.
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: privado/practicaFinal/bildyapp-ts/coverage/
          retention-days: 7